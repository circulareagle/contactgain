<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Moved | Redirecting</title>
    <!-- Link to the separate CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-container">

    <div class="card fade-in">
        <!-- Icon/Illustration -->
        <div class="icon-wrapper">
            <div class="icon-circle">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </div>
        </div>

        <!-- Text Content -->
        <h1 class="title">We've Moved!</h1>
        <p class="description">
            The page you are looking for has been relocated to a new address to provide you with a better experience.
        </p>

        <!-- The Link Button -->
        <a href="https://vcf.applifier.name.ng" class="btn-primary">
            Go to New URL
        </a>

        <!-- Secondary Info -->
        <div class="footer">
            <p class="footer-text">
                Please update your bookmarks. <br>
                Redirecting automatically in <span id="timer" class="timer-highlight">10</span> seconds...
            </p>
        </div>
    </div>

    <script>
        let timeLeft = 10;
        const timerElement = document.getElementById('timer');
        const targetUrl = "https://vcf.applifier.name.ng";

        const countdown = setInterval(() => {
            timeLeft--;
            if (timerElement) timerElement.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                // window.location.href = targetUrl;
            }
        }, 1000);
    </script>
</body>
</html>
